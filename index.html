<style>
/* ── TOKENS ── */
:root {
  --bg: #0C0A0E; --s1: #141315; --s2: #18141C;
  --parchment: #F5F1EB; --muted: #cdc3d2;
  --violet: #8B5CF6; --violet-deep: #5b2d8e; --violet-pale: #dbb8ff;
  --copper: #A0522D; --copper-light: #C8A882;
  --ff-d: "Cormorant Garamond", Georgia, serif;
  --ff-b: "Outfit", sans-serif;
  --ff-m: "DM Mono", monospace;
  --px: clamp(1.25rem, 5vw, 6rem);
  --section: clamp(5rem, 10vw, 9rem);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--parchment);
  font-family: var(--ff-b); font-weight: 300;
  overflow-x: hidden;
}
@media (hover:hover) and (pointer:fine) { body { cursor: none; } }

/* ── CURSOR ── */
#cursor-dot, #cursor-ring { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); border-radius: 50%; }
#cursor-dot { width: 6px; height: 6px; background: var(--parchment); top: 0; left: 0; }
#cursor-ring { width: 32px; height: 32px; border: 1px solid rgba(139,92,246,0); top: 0; left: 0; z-index: 9998; transition: width .3s, height .3s, border-color .3s; }
body.hovering #cursor-ring { width: 44px; height: 44px; border-color: rgba(139,92,246,0.6); }
.cursor-trail { position: fixed; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: 9997; transform: translate(-50%,-50%); }

/* ── SCROLL PROGRESS ── */
#scroll-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0; background: linear-gradient(90deg, var(--violet-deep), var(--violet), var(--violet-pale)); z-index: 10000; box-shadow: 0 0 8px rgba(139,92,246,.5); }

/* ── PARALLAX BG ── */
.parallax-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.halo { position: absolute; border-radius: 50%; filter: blur(80px); }
.halo-1 { width: 900px; height: 900px; background: radial-gradient(circle, rgba(91,45,142,.2) 0%, transparent 70%); top: -200px; right: -200px; }
.halo-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(160,82,45,.1) 0%, transparent 70%); bottom: 10%; left: -100px; }
.halo-3 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,.12) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); }

/* ── PARTICLES ── */
#particles-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 1; }

/* ── PAGE WRAPPER ── */
#pw { position: relative; z-index: 10; }

/* ── SCROLL REVEAL ──
   Key insight: content is VISIBLE by default.
   JS adds .js-ready to body, then .reveal hides.
   If JS fails, everything shows. ── */
body.js-ready .reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity .6s cubic-bezier(.25,1,.5,1), transform .6s cubic-bezier(.25,1,.5,1);
  will-change: opacity, transform;
}
body.js-ready .reveal.visible { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: .08s; }
.reveal-delay-2 { transition-delay: .18s; }
.reveal-delay-3 { transition-delay: .30s; }
.reveal-delay-4 { transition-delay: .44s; }

/* ── SECTION LABELS ── */
.section-label {
  display: block; font-family: var(--ff-m); font-size: .6rem;
  letter-spacing: .4em; text-transform: uppercase; margin-bottom: 1.25rem;
}
.label-copper { color: var(--copper); }
.label-violet { color: var(--violet); }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem var(--px);
  background: rgba(12,10,14,.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: .5px solid rgba(160,82,45,.12);
  transition: padding .4s;
}
nav.scrolled { padding: 1rem var(--px); }
.nav-logo { display: flex; align-items: center; gap: .75rem; text-decoration: none; }
.nav-logo-img { height: 42px; width: auto; object-fit: contain; }
.nav-wordmark { font-family: var(--ff-m); font-size: .7rem; font-weight: 500; letter-spacing: -.02em; color: var(--parchment); line-height: 1.2; }
.nav-wordmark small { display: block; font-size: .5rem; letter-spacing: .15em; opacity: .5; text-transform: uppercase; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-family: var(--ff-m); font-size: .6rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(245,241,235,.55); text-decoration: none; transition: color .2s; position: relative; }
.nav-links a::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 0; height: .5px; background: var(--violet); transition: width .3s; }
.nav-links a:hover { color: var(--parchment); }
.nav-links a:hover::after { width: 100%; }
.nav-cta { font-family: var(--ff-m); font-size: .58rem; letter-spacing: .2em; text-transform: uppercase; color: var(--parchment); background: none; border: .5px solid rgba(139,92,246,.35); padding: .55rem 1.4rem; cursor: none; transition: background .3s, border-color .3s; }
.nav-cta:hover { background: rgba(139,92,246,.08); border-color: rgba(139,92,246,.6); }
#hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: .5rem; }
#hamburger span { display: block; width: 22px; height: 1px; background: var(--parchment); transition: all .3s; }

/* ── MOBILE MENU ── */
#mobile-menu {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(8,6,10,.97);
  backdrop-filter: blur(30px);
  flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
}
#mobile-menu.open { display: flex; }
#mobile-menu ul { list-style: none; text-align: center; }
#mobile-menu ul li + li { margin-top: 2rem; }
#mobile-menu ul a { font-family: var(--ff-d); font-size: clamp(2rem,8vw,3.5rem); font-style: italic; font-weight: 300; color: var(--parchment); text-decoration: none; opacity: .8; transition: opacity .2s, color .2s; }
#mobile-menu ul a:hover { opacity: 1; color: var(--violet-pale); }
#mobile-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: var(--parchment); font-size: 1.5rem; cursor: pointer; opacity: .6; }
