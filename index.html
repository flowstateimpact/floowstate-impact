<style>
/* ─────────────────────────────────────────
   TOKENS & RESET
───────────────────────────────────────── */
:root {
  --bg:          #0C0A0E;
  --surface-1:   #141315;
  --surface-2:   #18141C;
  --surface-3:   #201f21;
  --surface-4:   #2b292c;
  --surface-high:#363436;
  --parchment:   #F5F1EB;
  --parchment-60:#F5F1EB99;
  --parchment-30:#F5F1EB4D;
  --violet:      #8B5CF6;
  --violet-deep: #5b2d8e;
  --violet-pale: #dbb8ff;
  --copper:      #A0522D;
  --copper-light:#C8A882;
  --muted:       #cdc3d2;
  --outline:     #4b4451;

  --ff-display: 'Cormorant Garamond', Georgia, serif;
  --ff-body:    'Outfit', sans-serif;
  --ff-mono:    'DM Mono', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--parchment);
  font-family: var(--ff-body);
  font-weight: 300;
  overflow-x: hidden;
  cursor: none;
}

/* ─────────────────────────────────────────
   CUSTOM CURSOR
───────────────────────────────────────── */
#cursor-dot {
  width: 6px; height: 6px;
  background: var(--parchment);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.08s ease, background 0.2s;
}
#cursor-ring {
  width: 32px; height: 32px;
  border: 1px solid rgba(139,92,246,0);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
}
body.hovering #cursor-ring {
  width: 44px; height: 44px;
  border-color: rgba(139,92,246,0.6);
  box-shadow: 0 0 20px rgba(139,92,246,0.2);
}
body.hovering #cursor-dot { transform: translate(-50%,-50%) scale(0); }

/* ─────────────────────────────────────────
   GRAIN CANVAS (fixed overlay)
───────────────────────────────────────── */
#grain-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9990;
  opacity: 0.045;
}

/* ─────────────────────────────────────────
   PARALLAX LAYERS
───────────────────────────────────────── */
.parallax-bg {
  position: fixed; inset: 0; z-index: 0;
  will-change: transform;
}
.parallax-bg .halo-1 {
  position: absolute;
  width: 900px; height: 900px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(91,45,142,0.18) 0%, transparent 70%);
  top: -200px; right: -200px;
  filter: blur(60px);
}
.parallax-bg .halo-2 {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(160,82,45,0.09) 0%, transparent 70%);
  bottom: 10%; left: -100px;
  filter: blur(80px);
}
.parallax-bg .halo-3 {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  filter: blur(100px);
}

/* ─────────────────────────────────────────
   MAIN CONTENT WRAPPER
───────────────────────────────────────── */
#page-wrapper { position: relative; z-index: 10; }  /* above particle canvas */

/* ─────────────────────────────────────────
   PAGE LOADER
───────────────────────────────────────── */
#loader {
  position: fixed; inset: 0; z-index: 99999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.5rem;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-mark {
  width: 48px; height: 48px;
  border: 0.5px solid rgba(139,92,246,0.3);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: loader-spin 1s linear infinite;
}
.loader-text {
  font-family: var(--ff-mono);
  font-size: 0.55rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(245,241,235,0.3);
  animation: loader-pulse 1.2s ease-in-out infinite;
}
@keyframes loader-spin { to { transform: rotate(360deg); } }
@keyframes loader-pulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ─────────────────────────────────────────
   SCROLL REVEAL — multi-variant
───────────────────────────────────────── */
/* Default: fade up */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.6s cubic-bezier(0.25,1,0.5,1),
              transform 0.6s cubic-bezier(0.25,1,0.5,1);
  will-change: transform, opacity;
}
.reveal.visible { opacity: 1; transform: none; }

/* Clip-path wipe — for headings */
.reveal-clip {
  opacity: 0;
  clip-path: inset(0 0 100% 0);
  transform: translateY(20px);
  transition: clip-path 0.9s cubic-bezier(0.16,1,0.3,1),
              opacity 0.4s ease,
              transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.reveal-clip.visible {
  opacity: 1;
  clip-path: inset(0 0 0% 0);
  transform: none;
}

/* Slide from left */
.reveal-left {
  opacity: 0;
  transform: translateX(-60px);
  transition: opacity 1s cubic-bezier(0.16,1,0.3,1),
              transform 1s cubic-bezier(0.16,1,0.3,1);
}
.reveal-left.visible { opacity: 1; transform: none; }

/* Slide from right */
.reveal-right {
  opacity: 0;
  transform: translateX(60px);
  transition: opacity 1s cubic-bezier(0.16,1,0.3,1),
              transform 1s cubic-bezier(0.16,1,0.3,1);
}
.reveal-right.visible { opacity: 1; transform: none; }

/* Scale in */
.reveal-scale {
  opacity: 0;
  transform: scale(0.88);
  transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
              transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.reveal-scale.visible { opacity: 1; transform: none; }

/* Stagger delays */
.reveal-delay-1 { transition-delay: 0.08s; }
.reveal-delay-2 { transition-delay: 0.18s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.44s; }
.reveal-delay-5 { transition-delay: 0.6s; }

/* tilt cards replaced by scroll-snap */

/* ─────────────────────────────────────────
   CURSOR TRAIL
───────────────────────────────────────── */
.cursor-trail {
  position: fixed;
  width: 4px; height: 4px;
  background: var(--violet);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9997;
  transform: translate(-50%,-50%);
  transition: opacity 0.5s;
}

/* ─────────────────────────────────────────
   WORD REVEAL (manifesto)
───────────────────────────────────────── */
.word-reveal .word {
  display: inline-block;
  overflow: hidden;
  vertical-align: bottom;
  line-height: 1.3;
}
.word-reveal .word-inner {
  display: inline-block;
  transform: translateY(110%);
  transition: transform 0.75s cubic-bezier(0.16,1,0.3,1);
}
.word-reveal.visible .word-inner { transform: translateY(0); }

/* ─────────────────────────────────────────
   SECTION COUNTER NUMBERS
───────────────────────────────────────── */
.value-num { transition: color 0.6s; }
.value-item.visible .value-num { color: rgba(139,92,246,0.4); }

/* ─────────────────────────────────────────
   HORIZONTAL TICKER
───────────────────────────────────────── */
.ticker-wrap {
  overflow: hidden;
  border-top: 0.5px solid rgba(160,82,45,0.12);
  border-bottom: 0.5px solid rgba(160,82,45,0.12);
  padding: 1rem 0;
  background: var(--surface-1);
}
.ticker-track {
  display: flex;
  gap: 4rem;
  white-space: nowrap;
  animation: ticker-scroll 28s linear infinite;
  width: max-content;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  font-family: var(--ff-mono);
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(245,241,235,0.3);
  flex-shrink: 0;
}
.ticker-item .sep { color: var(--copper); opacity: 0.5; margin: 0 1.5rem; }
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ─────────────────────────────────────────
   GLITCH EFFECT (on logo hover)
───────────────────────────────────────── */
@keyframes glitch-1 {
  0%,100% { clip-path: inset(0 0 95% 0); transform: translate(-3px, 0); }
  20%     { clip-path: inset(30% 0 50% 0); transform: translate(3px, 0); }
  40%     { clip-path: inset(70% 0 10% 0); transform: translate(-2px, 0); }
  60%     { clip-path: inset(10% 0 70% 0); transform: translate(2px, 0); }
  80%     { clip-path: inset(50% 0 30% 0); transform: translate(-1px, 0); }
}
@keyframes glitch-2 {
  0%,100% { clip-path: inset(80% 0 0 0); transform: translate(3px, 0); color: var(--copper-light); }
  25%     { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 0); }
  50%     { clip-path: inset(60% 0 20% 0); transform: translate(2px, 0); }
  75%     { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 0); }
}

.icon-svg {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  vertical-align: middle;
}
.icon-svg svg { display: block; }
/* glitch removed with wordmark */

/* ─────────────────────────────────────────
   SCROLL PROGRESS BAR
───────────────────────────────────────── */
#scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--violet-deep), var(--violet), var(--violet-pale));
  z-index: 10000;
  transition: width 0.1s linear;
  box-shadow: 0 0 8px rgba(139,92,246,0.5);
}

/* Pull quote scroll highlight */
.pull-quote-text .highlight-word {
  transition: color 0.4s ease, text-shadow 0.4s ease;
}
.pull-quote-text .highlight-word.lit {
  color: var(--violet-pale);
  text-shadow: 0 0 30px rgba(219,184,255,0.3);
}

/* ─────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 2.5rem;
  background: rgba(12,10,14,0.55);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 0.5px solid rgba(160,82,45,0.12);
  transition: padding 0.4s ease;
}
nav.scrolled { padding: 1rem 2.5rem; }

.nav-logo {
  display: flex; align-items: center; gap: 0.75rem;
  text-decoration: none;
}
.nav-logo-img {
  height: 44px; width: auto;
  filter: brightness(1.1);
  object-fit: contain;
}
.nav-wordmark {
  font-family: var(--ff-mono);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--parchment);
  line-height: 1.2;
}
.nav-wordmark small {
  display: block;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  opacity: 0.5;
  font-weight: 300;
  text-transform: uppercase;
}

.nav-links {
  display: flex; gap: 3rem; list-style: none;
}
.nav-links a {
  font-family: var(--ff-mono);
  font-size: 0.625rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(245,241,235,0.6);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -4px; left: 0;
  width: 0; height: 0.5px;
  background: var(--violet);
  transition: width 0.3s ease;
}
.nav-links a:hover { color: var(--parchment); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active {
  color: var(--violet-pale);
  border-bottom: 0.5px solid rgba(139,92,246,0.5);
  padding-bottom: 4px;
}

.nav-cta {
  font-family: var(--ff-mono);
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--parchment);
  background: none;
  border: 0.5px solid rgba(139,92,246,0.35);
  padding: 0.6rem 1.5rem;
  cursor: none;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
.nav-cta:hover {
  background: rgba(139,92,246,0.08);
  border-color: rgba(139,92,246,0.6);
  box-shadow: 0 0 24px rgba(139,92,246,0.12);
}

   HERO
───────────────────────────────────────── */
